name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-linux:
    name: Release Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build release binary
        run: cross build --locked --release --target ${{ matrix.target }} --bin xg

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          archive_dir="dist/xg-${version}-${target}"
          mkdir -p "${archive_dir}"
          cp "target/${target}/release/xg" "${archive_dir}/xg"
          cp README.md "${archive_dir}/README.md"
          cp LICENSE "${archive_dir}/LICENSE"
          tar -C dist -czf "${archive_dir}.tar.gz" "xg-${version}-${target}"
          shasum -a 256 "${archive_dir}.tar.gz" > "${archive_dir}.tar.gz.sha256"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
